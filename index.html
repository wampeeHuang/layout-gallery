<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>版式画廊</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a1a1a'/%3E%3Crect x='7' y='14' width='22' height='28' rx='3' fill='%23ff6b6b'/%3E%3Crect x='32' y='20' width='24' height='18' rx='3' fill='%234ecdc4'/%3E%3Crect x='36' y='26' width='16' height='18' rx='3' fill='%23ffe66d'/%3E%3C/svg%3E">
<style>@font-face{font-family:"Inter";src:local("Segoe UI"),local("Helvetica Neue"),local("Arial")}@font-face{font-family:"Noto Sans SC";src:local("PingFang SC"),local("Microsoft YaHei"),local("Hiragino Sans GB"),sans-serif}</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa; --bg-card:#fff; --text:#1a1a1a; --text-secondary:#666; --text-muted:#999;
  --border:#e8e8e8; --accent:#2563eb; --accent-hover:#1d4ed8;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04); --shadow-md:0 8px 30px rgba(0,0,0,0.08);
  --radius:12px;
  font-family:'Inter','Noto Sans SC',sans-serif; color:var(--text); background:var(--bg);
  font-size:16px;
}

.header{
  position:sticky; top:0; z-index:100;
  background:rgba(250,250,250,0.88); backdrop-filter:blur(14px);
}
.header-inner{max-width:1500px; margin:0 auto; padding:20px 32px 10px}

.header-brand{display:flex; align-items:center; gap:14px; margin-bottom:12px}
.header-logo{flex-shrink:0}
.header-title{font-size:32px; font-weight:700; letter-spacing:-0.03em; margin:0; line-height:1.1}

.header-search-row{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
.search-box{flex:1; min-width:240px; max-width:420px; display:flex; align-items:center; gap:0; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; transition:border-color 150ms; overflow:hidden}
.search-box:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.search-box input{flex:1; border:none; background:none; outline:none; font-size:15px; font-family:inherit; color:var(--text); padding:11px 16px}
.search-box input::placeholder{color:var(--text-muted)}
.search-btn{padding:11px 18px; border:none; background:var(--bg); border-left:1px solid var(--border); font-size:16px; cursor:pointer; font-family:inherit; color:var(--text-secondary); transition:all 140ms; flex-shrink:0; line-height:1}
.search-btn:hover{background:var(--accent); color:#fff}
.result-count{font-size:13px; color:var(--text-secondary); white-space:nowrap}

.filters{position:sticky;z-index:99;background:var(--bg);border-bottom:1px solid var(--border);transition:transform 350ms ease,opacity 300ms ease}
.filters.hide{transform:translateY(-110%);opacity:0;pointer-events:none}
.filters-inner{max-width:1500px;margin:0 auto;padding:0 32px 14px}

.filter-row{display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; flex-wrap:wrap}
.filter-label{font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); padding-top:9px; min-width:44px; white-space:nowrap}
.filter-chips{display:flex; gap:8px; flex-wrap:wrap; flex:1}
.filter-chip{padding:7px 18px; border-radius:22px; border:1px solid var(--border); background:var(--bg-card); font-size:13px; cursor:pointer; white-space:nowrap; transition:all 140ms; font-family:inherit; color:var(--text-secondary); user-select:none; line-height:1.4}
.filter-chip:hover{border-color:var(--accent); color:var(--accent)}
.filter-chip.active{background:var(--accent); color:#fff; border-color:var(--accent)}
.filter-chip .count{opacity:0.55; margin-left:3px; font-size:12px}
.filter-chip.active .count{opacity:1}

.content{padding:28px 32px 48px; max-width:1520px; margin:0 auto}
.grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:24px}

.card{background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:all 200ms; overflow:hidden; display:flex; flex-direction:column}
.card:hover{box-shadow:var(--shadow-md); transform:translateY(-3px); border-color:#d0d0d0}
.card-preview{aspect-ratio:16/10; overflow:hidden; flex-shrink:0; background:#f0ede6; position:relative}
.card-preview iframe{position:absolute; top:0; left:0; border:none; pointer-events:none; user-select:none; transform-origin:top left}

.card-preview-overlay{position:absolute; inset:0; z-index:2; background:rgba(0,0,0,0.16); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 220ms; pointer-events:none}
.card-preview:hover .card-preview-overlay{opacity:1; pointer-events:auto}
.card-preview-open{padding:10px 22px; border-radius:22px; background:rgba(255,255,255,0.94); backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.6); font-size:13px; font-weight:600; cursor:pointer; color:#1a1a1a; box-shadow:0 4px 20px rgba(0,0,0,0.12); transition:all 160ms; font-family:inherit; white-space:nowrap; letter-spacing:0.01em}
.card-preview-open:hover{background:#fff; box-shadow:0 6px 28px rgba(0,0,0,0.18); transform:scale(1.04)}

.card-body{padding:18px 20px 14px; flex:1; display:flex; flex-direction:column; gap:8px; position:relative}
.card-name{font-size:15px; font-weight:700; color:var(--text); line-height:1.3; transition:color 150ms}
.card:hover .card-name{color:var(--accent)}
.card-detail-hint{font-size:11px; color:transparent; transition:color 180ms; display:inline-flex; align-items:center; gap:4px; margin-top:2px}
.card:hover .card-detail-hint{color:var(--text-muted)}
.card-tagline{font-size:13px; color:var(--text-secondary); line-height:1.5; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex; align-items:center; gap:10px; margin-top:auto; padding-top:6px}
.card-path{font-size:12px; color:var(--text-muted); font-family:"SF Mono","Cascadia Code","Consolas",monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1}
.copy-btn{padding:5px 14px; border-radius:6px; border:1px solid var(--border); background:var(--bg); font-size:12px; cursor:pointer; font-family:inherit; color:var(--text-muted); white-space:nowrap; transition:all 140ms; flex-shrink:0}
.copy-btn:hover{border-color:var(--accent); color:var(--accent)}
.copy-btn.copied{background:#ecfdf5; color:#059669; border-color:#a7f3d0}

.card-tags{display:flex; flex-wrap:wrap; gap:5px}
.tag{padding:3px 10px; border-radius:4px; font-size:11px; font-weight:500; background:var(--bg); color:var(--text-secondary); white-space:nowrap}
.tag.mood{background:#fef3e4; color:#b85e1a}
.tag.scheme-dark{background:#f1f5f9; color:#334155}
.tag.scheme-mixed{background:#f5f3ff; color:#6d28d9}
.tag.scheme-light{background:#fefce8; color:#a16207}

.empty{text-align:center;padding:80px 20px;color:var(--text-muted)}
.empty h3{font-size:18px;margin-bottom:8px;color:var(--text-secondary)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;justify-content:center;align-items:flex-start;padding:60px 20px 40px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg-card);border-radius:16px;max-width:580px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,0.18);position:relative}
.modal-header{padding:28px 28px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.modal-header h2{font-size:24px;font-weight:700;line-height:1.2}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);padding:4px 8px;line-height:1;flex-shrink:0}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px 28px 28px;display:flex;flex-direction:column;gap:18px}
.modal-tagline{font-size:15px;color:var(--text-secondary);line-height:1.5}
.modal-section h4{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:8px}
.modal-link{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:var(--accent);color:#fff;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;transition:background 150ms}
.modal-link:hover{background:var(--accent-hover)}
.modal-copy-row{display:flex;gap:10px;flex-wrap:wrap}
.modal-copy-btn{display:inline-flex;align-items:center;gap:4px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;cursor:pointer;font-family:inherit;color:var(--text-secondary);transition:all 140ms}
.modal-copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.modal-copy-btn.copied{background:#ecfdf5;color:#059669;border-color:#a7f3d0}
.modal-copy-btn code{font-family:"SF Mono","Cascadia Code","Consolas",monospace; font-size:12px; background:rgba(0,0,0,0.04); padding:2px 8px; border-radius:4px}

.palette-dot{width:18px; height:18px; border-radius:50%; border:1px solid rgba(0,0,0,0.1); flex-shrink:0}
.css-var-row{display:flex; gap:8px; padding:2px 0; font-size:12px; font-family:"SF Mono","Cascadia Code","Consolas",monospace}
.css-var-name{color:var(--accent); min-width:140px}
.css-var-val{color:var(--text-muted); flex:1}
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-inner">
    <div class="header-brand">
      <svg class="header-logo" width="48" height="48" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="14" fill="#1a1a1a"/><rect x="7" y="14" width="22" height="28" rx="3" fill="#ff6b6b"/><rect x="32" y="20" width="24" height="18" rx="3" fill="#4ecdc4"/><rect x="36" y="26" width="16" height="18" rx="3" fill="#ffe66d"/></svg>
      <h1 class="header-title">版式画廊</h1>
    </div>
    <div class="header-search-row">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索模板名称、风格、用途…">
        <button class="search-btn" id="searchBtn" title="搜索">🔍</button>
      </div>
      <span class="result-count" id="resultCount">— 个模板</span>
    </div>
  </div>
</div>

<div class="filters" id="filters">
  <div class="filters-inner">
    <div class="filter-row" id="sourceFilters" style="display:none">
      <div class="filter-label">来源</div>
      <div class="filter-chips" id="sourceChips"></div>
    </div>
    <div class="filter-row" id="styleFilters">
      <div class="filter-label">风格</div>
      <div class="filter-chips" id="styleChips"></div>
    </div>
    <div class="filter-row" id="schemeFilters">
      <div class="filter-label">色系</div>
      <div class="filter-chips" id="schemeChips"></div>
    </div>
    <div class="filter-row" id="formalityFilters">
      <div class="filter-label">正式度</div>
      <div class="filter-chips" id="formalityChips"></div>
    </div>
    <div class="filter-row" id="densityFilters">
      <div class="filter-label">密度</div>
      <div class="filter-chips" id="densityChips"></div>
    </div>
  </div>
</div>

<div class="content">
  <div class="grid" id="layoutGrid"></div>
  <div class="empty" id="emptyState" style="display:none">
    <h3>未找到匹配模板</h3>
    <p>尝试调整搜索词或筛选条件</p>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox" onclick="event.stopPropagation()"></div>
</div>

<script>
// Display labels (English → Chinese)
const SKILL_LABELS = {'beautiful-html-templates':'精美版式','guizang-ppt-skill':'归藏PPT','frontend-design':'前端设计','codebase-to-course':'代码转课程'};
const STYLE_LABELS = {'editorial':'编辑/杂志','swiss-minimal':'极简瑞士','warm-humanist':'温暖人文','tech-cyberpunk':'科技/赛博','experimental':'实验/前卫','institutional':'机构/权威','eastern-zen':'东方禅意'};
const SCHEME_LABELS = {light:'☀️ 亮色',dark:'🌙 暗色',mixed:'🌓 混合'};
const SCHEME_SHORT = {light:'亮',dark:'暗',mixed:'混'};
const FORMALITY_MAP = {high:'权威','medium-high':'正式',medium:'适中','medium-low':'休闲',low:'休闲'};
const DENSITY_MAP = {high:'高密度','medium-high':'高密度',medium:'中密度',low:'低密度'};

// Reverse maps (Chinese → English) for API params
const SOURCE_REVERSE = {'精美版式':'beautiful-html-templates','归藏PPT':'guizang-ppt-skill','前端设计':'frontend-design','代码转课程':'codebase-to-course'};
const STYLE_REVERSE = {'编辑/杂志':'editorial','极简瑞士':'swiss-minimal','温暖人文':'warm-humanist','科技/赛博':'tech-cyberpunk','实验/前卫':'experimental','机构/权威':'institutional','东方禅意':'eastern-zen'};
const FORMALITY_REVERSE = {'权威':'high','正式':'medium-high','适中':'medium','休闲':'low'};
const DENSITY_REVERSE = {'高密度':'high','中密度':'medium','低密度':'low'};

const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

let templates = [];           // Full list (for chips + modal lookup)
let activeSource = 'all', activeStyle = 'all', activeScheme = 'all';
let activeFormality = 'all', activeDensity = 'all', searchQuery = '';

async function fetchFiltered() {
  const p = new URLSearchParams();
  if(activeSource!=='all') p.set('skill', SOURCE_REVERSE[activeSource]||activeSource);
  if(activeStyle!=='all') p.set('design_style', STYLE_REVERSE[activeStyle]||activeStyle);
  if(activeScheme!=='all') p.set('scheme', activeScheme);
  if(activeFormality!=='all') p.set('formality', FORMALITY_REVERSE[activeFormality]||activeFormality);
  if(activeDensity!=='all') p.set('density', DENSITY_REVERSE[activeDensity]||activeDensity);
  if(searchQuery) p.set('q', searchQuery);
  const qs = p.toString();
  const res = await fetch('/api/registry' + (qs?'?'+qs:''));
  const data = await res.json();
  const items = data.items.filter(t => t.status !== 'placeholder');
  items.forEach(t => {
    if(FORMALITY_MAP[t.formality]) t.formality_cn = FORMALITY_MAP[t.formality];
    if(DENSITY_MAP[t.density]) t.density_cn = DENSITY_MAP[t.density];
  });
  return items;
}

async function init() {
  try {
    const res = await fetch('/api/registry');
    const data = await res.json();
    templates = data.items.filter(t => t.status !== 'placeholder');
  } catch(e) {
    document.getElementById('layoutGrid').innerHTML = '<div class="empty"><h3>未找到模板数据</h3><p>请先启动: <code>node server.js</code></p></div>';
    return;
  }
  templates.forEach(t => {
    if(FORMALITY_MAP[t.formality]) t.formality_cn = FORMALITY_MAP[t.formality];
    if(DENSITY_MAP[t.density]) t.density_cn = DENSITY_MAP[t.density];
  });
  if(isLocal) renderSourceFilters();
  renderStyleFilters(); renderSchemeFilters();
  renderFormalityFilters(); renderDensityFilters();
  renderGrid(templates);
  bindEvents();
}
document.addEventListener('DOMContentLoaded', init);

function chip(label, count, group, value, active) {
  return `<button class="filter-chip${active?' active':''}" data-group="${group}" data-val="${value}" onclick="selectFilter('${group}','${value}')">${label}<span class="count">${count}</span></button>`;
}

function renderSourceFilters() {
  document.getElementById('sourceFilters').style.display = '';
  const by={}; templates.forEach(t=>{const k=SKILL_LABELS[t.skill]||t.skill;by[k]=(by[k]||0)+1;});
  let h=chip('全部',templates.length,'source','all',true);
  Object.entries(by).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{h+=chip(n,c,'source',n,false);});
  document.getElementById('sourceChips').innerHTML=h;
}
function renderStyleFilters() {
  const by={}; templates.forEach(t=>{const k=STYLE_LABELS[t.design_style]||t.design_style;by[k]=(by[k]||0)+1;});
  let h=chip('全部',templates.length,'style','all',true);
  Object.entries(by).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{h+=chip(n,c,'style',n,false);});
  document.getElementById('styleChips').innerHTML=h;
}
function renderSchemeFilters() {
  const by={}; templates.forEach(t=>{by[t.scheme]=(by[t.scheme]||0)+1;});
  let h=chip('全部',templates.length,'scheme','all',true);
  Object.keys(SCHEME_LABELS).forEach(s=>{if(by[s])h+=chip(SCHEME_LABELS[s],by[s],'scheme',s,false);});
  document.getElementById('schemeChips').innerHTML=h;
}
function renderFormalityFilters() {
  const order=['权威','正式','适中','休闲']; const by={};
  templates.forEach(t=>{const f=t.formality_cn||'适中';by[f]=(by[f]||0)+1;});
  let h=chip('全部正式度',templates.length,'formality','all',true);
  order.forEach(f=>{if(by[f])h+=chip(f,by[f],'formality',f,false);});
  document.getElementById('formalityChips').innerHTML=h;
}
function renderDensityFilters() {
  const order=['高密度','中密度','低密度']; const by={};
  templates.forEach(t=>{const d=t.density_cn||'中密度';by[d]=(by[d]||0)+1;});
  let h=chip('全部密度',templates.length,'density','all',true);
  order.forEach(d=>{if(by[d])h+=chip(d,by[d],'density',d,false);});
  document.getElementById('densityChips').innerHTML=h;
}

async function selectFilter(group, value) {
  const map={source:'activeSource',style:'activeStyle',scheme:'activeScheme',formality:'activeFormality',density:'activeDensity'};
  window[map[group]]=value;
  document.querySelectorAll(`[data-group="${group}"]`).forEach(el=>el.classList.remove('active'));
  const tgt=document.querySelector(`[data-group="${group}"][data-val="${value}"]`);
  if(tgt)tgt.classList.add('active');
  const items = await fetchFiltered();
  renderGrid(items);
}

function renderGrid(items) {
  document.getElementById('resultCount').textContent=`${items.length} 个模板`;
  const grid=document.getElementById('layoutGrid'), empty=document.getElementById('emptyState');
  if(items.length===0){grid.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';

  grid.innerHTML=items.map(t=>{
    const tags=[];
    (t.mood||[]).slice(0,2).forEach(m=>tags.push(`<span class="tag mood">${m}</span>`));
    if(t.formality_cn)tags.push(`<span class="tag">${t.formality_cn}</span>`);
    if(t.scheme){const cls='scheme-'+t.scheme;tags.push(`<span class="tag ${cls}">${SCHEME_SHORT[t.scheme]||t.scheme}</span>`);}
    if(t.slide_count)tags.push(`<span class="tag">${t.slide_count} 页</span>`);
    const apiPath = '/api/template/' + t.slug + '/html';
    return `<div class="card">
      <div class="card-preview" onclick="event.stopPropagation();window.open('${t.template_path}','_blank')" style="cursor:pointer">
        <iframe src="${t.template_path}" loading="lazy"></iframe>
        <div class="card-preview-overlay" onclick="event.stopPropagation()">
          <button class="card-preview-open" onclick="event.stopPropagation();window.open('${t.template_path}','_blank')">打开预览 ↗</button>
        </div>
      </div>
      <div class="card-body" onclick="event.stopPropagation();openModal('${t.slug}')" style="cursor:pointer">
        <div class="card-name">${t.name}</div>
        ${t.tagline?`<div class="card-tagline">${t.tagline}</div>`:''}
        <div class="card-tags">${tags.join('')}</div>
        <div class="card-meta">
          <span class="card-path">${apiPath}</span>
          <button class="copy-btn" onclick="event.stopPropagation();copyPath('${apiPath}',this)" title="复制 API 路径">📋 复制</button>
        </div>
        <div class="card-detail-hint">查看详情 →</div>
      </div>
    </div>`;
  }).join('');
  requestAnimationFrame(()=>scaleIframes());
}

function scaleIframes() {
  document.querySelectorAll('.card-preview iframe').forEach(iframe => {
    const container = iframe.parentElement;
    const w = container.offsetWidth;
    if(!w) return;
    const scale = w / 960;
    iframe.style.width = '960px';
    iframe.style.height = '600px';
    iframe.style.transform = `scale(${scale})`;
  });
}

function copyPath(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 已复制'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = '✓ 已复制'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 1800);
  });
}

function openModal(slug) {
  const t = templates.find(x => x.slug === slug);
  if(!t) return;

  const paletteHTML = (t.palette||[]).map(c =>
    `<span class="palette-dot" style="background:${c.color}" title="${c.name}: ${c.color}"></span><span style="font-size:11px;color:var(--text-muted);margin-right:10px">${c.name}</span>`
  ).join('');

  const tags = [];
  (t.mood||[]).forEach(m => tags.push(`<span class="tag mood">${m}</span>`));
  (t.tone||[]).forEach(m => tags.push(`<span class="tag">${m}</span>`));
  if(t.occasion) t.occasion.slice(0,4).forEach(o => tags.push(`<span class="tag">${o}</span>`));

  const cssVarsHTML = (t.css_variables||[]).length > 0
    ? t.css_variables.map(v => `<div class="css-var-row"><span class="css-var-name">${v.name}</span><span class="css-var-val">${v.default}</span></div>`).join('')
    : '<p style="color:var(--text-muted);font-size:12px">无 :root CSS 变量</p>';

  const apiPath = '/api/template/' + t.slug + '/html';
  const designStyle = STYLE_LABELS[t.design_style] || t.design_style || '—';

  document.getElementById('modalBox').innerHTML = `
    <div class="modal-header">
      <h2>${t.name}</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${t.tagline ? `<div class="modal-tagline">${t.tagline}</div>` : ''}

      <div class="modal-section">
        <h4>路径</h4>
        <div class="modal-copy-row">
          <button class="modal-copy-btn" onclick="copyPath('${apiPath}',this)">
            📋 API: <code>${apiPath}</code>
          </button>
          ${isLocal ? `<button class="modal-copy-btn" onclick="copyPath('${t.skill}',this)">
            📁 来源: <code>${SKILL_LABELS[t.skill]||t.skill}</code>
          </button>` : ''}
          <button class="modal-copy-btn" onclick="copyPath('${t.template_path}',this)">
            📁 文件: <code>${t.template_path}</code>
          </button>
        </div>
      </div>

      <div class="modal-section"><h4>风格分类</h4><p style="font-size:13px">${designStyle} · ${t.formality_cn||''} · ${t.density_cn||''} · ${SCHEME_SHORT[t.scheme]||t.scheme}</p></div>

      ${t.typography_style ? `<div class="modal-section"><h4>字体风格</h4><p style="font-size:13px">${t.typography_style}</p></div>` : ''}
      ${t.displayFont||t.bodyFont ? `<div class="modal-section"><h4>字体</h4><p style="font-size:14px">展示: ${t.displayFont||'—'}<br>正文: ${t.bodyFont||'—'}</p></div>` : ''}
      ${paletteHTML ? `<div class="modal-section"><h4>配色</h4><div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px">${paletteHTML}</div></div>` : ''}
      ${tags.length ? `<div class="modal-section"><h4>标签</h4><div class="card-tags">${tags.join('')}</div></div>` : ''}
      ${cssVarsHTML !== '<p style="color:var(--text-muted);font-size:12px">无 :root CSS 变量</p>' ? `<div class="modal-section"><h4>CSS 变量合约</h4><div style="max-height:200px;overflow-y:auto">${cssVarsHTML}</div></div>` : ''}
      ${t.best_for ? `<div class="modal-section"><h4>适用场景</h4><p style="font-size:14px;color:var(--text-secondary);line-height:1.6">${t.best_for}</p></div>` : ''}
      ${t.avoid_for ? `<div class="modal-section"><h4>不适用场景</h4><p style="font-size:14px;color:var(--text-secondary);line-height:1.6">${t.avoid_for}</p></div>` : ''}
      <a href="${t.template_path}" target="_blank" class="modal-link">在新标签页打开完整模板 →</a>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if(e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function bindEvents() {
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', debounce(async e => {
    searchQuery = e.target.value.toLowerCase().trim();
    const items = await fetchFiltered();
    renderGrid(items);
  }, 200));
  document.getElementById('searchBtn').addEventListener('click', async () => {
    searchQuery = searchInput.value.toLowerCase().trim();
    const items = await fetchFiltered();
    renderGrid(items);
  });
  searchInput.addEventListener('keydown', async e => {
    if(e.key==='Enter'){ searchQuery = searchInput.value.toLowerCase().trim(); const items = await fetchFiltered(); renderGrid(items); }
  });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
  window.addEventListener('resize', debounce(() => scaleIframes(), 150));

  const filters = document.getElementById('filters');
  const header = document.getElementById('header');
  function syncFiltersTop() { filters.style.top = header.offsetHeight + 'px'; }
  syncFiltersTop();
  window.addEventListener('resize', syncFiltersTop);

  let lastScrollY = 0, ticking = false, hidden = false;
  window.addEventListener('scroll', () => {
    if(!ticking) {
      requestAnimationFrame(() => {
        const now = window.scrollY;
        if(!hidden && now > lastScrollY && now > 120) { hidden = true; filters.classList.add('hide'); }
        else if(hidden && now < lastScrollY) { hidden = false; filters.classList.remove('hide'); }
        if(now < 20) { hidden = false; filters.classList.remove('hide'); }
        lastScrollY = now; ticking = false;
      });
      ticking = true;
    }
  }, {passive:true});

  document.addEventListener('mousemove', e => {
    const top = header.offsetHeight;
    const bottom = top + 80;
    if(e.clientY >= top && e.clientY <= bottom) { hidden = false; filters.classList.remove('hide'); }
  }, {passive:true});
}

function debounce(fn, ms) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }
</script>
</body>
</html>
